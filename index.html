<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СФЕРА - Конвертер LaTeX в Word</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>LATEX <span>→ Word</span></h1>
        <p class="subtitle">Конвертер LaTeX в Microsoft Word</p>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".tex" style="display: none;">
            <div class="file-icon">📄</div>
            <h3>Выберите или перетащите .tex файл</h3>
            <p>Поддерживаются файлы до 10 MB</p>
        </div>
        
        <div class="file-info" id="fileInfo"></div>
        
        <button class="btn" id="convertBtn" disabled>Конвертировать в Word</button>
        
        <div class="status" id="status"></div>
        
        <p class="footer-note">СФЕРА • Курсовой проект • 2026</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
