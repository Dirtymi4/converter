<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СФЕРА - Конвертер LaTeX в Word</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">СФЕРА</div>
        <h1>LaTeX <span>→ Word</span></h1>
        <p class="subtitle">Профессиональная конвертация в DOCX</p>
        
        <div class="features">
            <div class="feature">✅ Редактируемый текст</div>
            <div class="feature">✅ Формулы в скобках [ ]</div>
            <div class="feature">✅ Сохранение структуры</div>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".tex,.txt,text/plain" style="display: none;">
            <div class="file-icon">📄</div>
            <h3>Выберите или перетащите .tex файл</h3>
            <p>Поддерживаются файлы до 10 MB</p>
        </div>
        
        <div class="file-info" id="fileInfo"></div>
        
        <button class="btn" id="convertBtn" disabled>
            <span class="btn-text">Конвертировать в DOCX</span>
        </button>
        
        <div class="status" id="status"></div>
        
        <p class="footer-note">
            СФЕРА • Курсовой проект • Саакова В.А • 2026
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
